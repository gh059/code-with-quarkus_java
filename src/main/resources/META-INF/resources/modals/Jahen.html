<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자헨 상세</title>
  
  <!-- Bootstrap 5 CSS (index.html과 동일하게 연동) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- LOL 스타일 맞추기 위한 간단 커스텀 (필요 시 resources/css/custom.css로 이동) -->
  <style>
    body {
      background-color: #0a0e17;
      color: white;
      padding: 1.5rem;
      font-family: 'Segoe UI', sans-serif;
    }
    h3, h4 {
      color: #c8aa6e; /* LOL 골드 톤 */
    }
    .text-muted {
      color: #a0a0a0 !important;
    }
    .list-group-item {
      background: transparent;
      border-color: #444;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row g-4">
      
      <!-- 왼쪽: 이미지 + 기본 정보 -->
      <div class="col-lg-5 text-center">
        <img src="../image/a5.jpeg" class="img-fluid rounded shadow-lg" alt="멜" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">자헨 (Jahen)</h3>
          <p class="text-muted fs-5">전사 / 난이도: 상</p>
        </div>
      </div>
      
      <!-- 오른쪽: 스킬 + 스토리 -->
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 전쟁 단련</li>
          <li class="list-group-item">Q: 다르킨의 글레이브</li>
          <li class="list-group-item">W: 공포의 귀환</li>
          <li class="list-group-item">E: 찬란한 쇄도</li>
          <li class="list-group-item">R: 단호한 판결</li>
        </ul>

        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
        <p class="text-secondary lh-lg">
          한때 신성과 불경한 힘을 모두 지녔던 자헨은, 동족 다르킨을 사냥하며 자신을 잠식하려는 타락에 맞서고 있다. 
          광기를 피해 스스로를 가두었던 글레이브에서 풀려난 그는, 고결함과 잔혹함 사이에서 끊임없는 내면의 전쟁을 치른다. 
          타락을 버텨내는 한, 자헨은 룬테라를 파멸시키려는 모든 위협 위에서 독보적인 존재로 군림할 것이다.
      
    </div>
  </div>

</body>
</html>
