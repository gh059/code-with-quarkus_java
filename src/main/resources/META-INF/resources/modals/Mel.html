<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멜 상세</title>
  
  <!-- Bootstrap 5 CSS (index.html과 동일하게 연동) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- LOL 스타일 맞추기 위한 간단 커스텀 (필요 시 resources/css/custom.css로 이동) -->
  <style>
    body {
      background-color: #0a0e17;
      color: white;
      padding: 1.5rem;
      font-family: 'Segoe UI', sans-serif;
    }
    h3, h4 {
      color: #c8aa6e; /* LOL 골드 톤 */
    }
    .text-muted {
      color: #a0a0a0 !important;
    }
    .list-group-item {
      background: transparent;
      border-color: #444;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row g-4">
      
      <!-- 왼쪽: 이미지 + 기본 정보 -->
      <div class="col-lg-5 text-center">
        <img src="../image/a3.jpeg" class="img-fluid rounded shadow-lg" alt="멜" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">멜 (Mel)</h3>
          <p class="text-muted fs-5">마법사 / 난이도: 중</p>
        </div>
      </div>
      
      <!-- 오른쪽: 스킬 + 스토리 -->
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 이글거리는 광휘</li>
          <li class="list-group-item">Q: 빛의 세례</li>
          <li class="list-group-item">W: 반박</li>
          <li class="list-group-item">E: 태양 올가미</li>
          <li class="list-group-item">R: 황금 일식</li>
        </ul>

        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
        <p class="text-secondary lh-lg">
          한때 녹서스에서 손꼽히는 세도가 중 하나였던 메다르다 가문의 실질적 후계자다. 
          검은 장미단의 기만을 마주하며 자신의 통제력을 벗어난 운명과 직면했다. 
          마법의 힘을 각성하고 진실을 찾아 고향으로 향한 그녀는, 내면의 빛을 노리는 수많은 위협 속에서도 결코 꺾이지 않는 강인한 의지로 자신의 길을 개척한다.
        </p>
      </div>
      
    </div>
  </div>

</body>
</html>
